<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white p-10">
    
    <h1 class="text-3xl font-bold mb-8">Admin Control Panel</h1>
    
    <div class="mb-12">
        <h2 class="text-xl font-semibold mb-4">Pending Deposits</h2>
        <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-800">
                    <tr>
                        <th class="p-4">User Email</th>
                        <th class="p-4">Amount</th>
                        <th class="p-4">Action</th>
                    </tr>
                </thead>
                <tbody id="depositList" class="divide-y divide-gray-800">
                    </tbody>
            </table>
        </div>
    </div>

    <div>
        <h2 class="text-xl font-semibold mb-4">User Accounts</h2>
        <div id="userList" class="bg-gray-900 p-6 rounded-2xl border border-gray-800">
            </div>
    </div>

    <script>
        // 1. Load Pending Deposits
        async function loadPending() {
            const res = await fetch('http://localhost:3000/api/admin/pending');
            const deposits = await res.json();
            const list = document.getElementById('depositList');
            list.innerHTML = ''; 

            deposits.forEach(dep => {
                list.innerHTML += `
                    <tr class="text-sm">
                        <td class="p-4">${dep.email}</td>
                        <td class="p-4">$${dep.amount}</td>
                        <td class="p-4">
                            <button onclick="approve('${dep.depositId}')" class="bg-green-600 hover:bg-green-700 px-4 py-1 rounded transition">Approve</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function approve(depositId) {
            await fetch('http://localhost:3000/api/admin/approve-deposit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ depositId })
            });
            loadPending();
        }

        // Fetch all users from the server
async function loadUsers() {
    const response = await fetch('http://localhost:3000/api/admin/users');
    const users = await response.json();
    const list = document.getElementById('userList');
    
    list.innerHTML = users.map(u => `
        <div class="p-4 border-b border-gray-800 flex justify-between items-center">
            <div>
                <p class="font-bold">${u.email}</p>
                <p class="text-sm text-gray-400">Password: <span class="font-mono text-orange-500">${u.password}</span></p>
                <p class="text-sm text-gray-500">Balance: $${u.balance}</p>
            </div>
            <div class="space-x-2">
                <button onclick="update('${u.email}')" class="bg-blue-600 px-3 py-1 rounded text-sm">Update</button>
                <button onclick="deleteUser('${u.email}')" class="bg-red-600 px-3 py-1 rounded text-sm">Delete</button>
            </div>
        </div>
    `).join('');
}

// Function to handle deletion
async function deleteUser(email) {
    if (confirm(`Are you sure you want to delete ${email}?`)) {
        await fetch('http://localhost:3000/api/admin/delete-user', {
            method: 'POST', // Using POST to keep it consistent with your current setup
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        loadUsers(); // Refresh the list
    }
}
        async function update(email) {
            const newBalance = prompt("Enter new balance for " + email);
            if(newBalance) {
                await fetch('http://localhost:3000/api/admin/update-balance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, newBalance })
                });
                loadUsers();
            }
        }

        // Initialize both
        loadPending();
        loadUsers();
    </script>
</body>
</html>
